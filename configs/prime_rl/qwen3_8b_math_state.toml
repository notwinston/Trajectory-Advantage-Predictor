max_steps = 48
seq_len = 4096
output_dir = "outputs/qwen3_math_loop/states"
clean_output_dir = false

[ckpt]
interval = 1

[deployment]
type = "single_node"
gpus_per_node = 2
num_train_gpus = 1
num_infer_gpus = 1

[model]
name = "Qwen/Qwen3-8B"

[wandb]
project = "qwen3-math-loop"
name = "qwen3-math-states"

[trainer.model]
impl = "auto"
seq_len = 4096

[trainer.model.ac]
freq = 1

[trainer.model.lora]
rank = 16
alpha = 32.0
dropout = 0.0

[trainer.optim]
lr = 1e-5

[trainer.ckpt.weights]
save_adapter_separately = true

[orchestrator]
batch_size = 4
group_size = 4
seq_len = 4096

[orchestrator.advantage]
type = "custom"
import_path = "math_loop.advantage.normalized_advantage"
kwargs = { eps = 1e-8 }

[orchestrator.model.lora]
name = "qwen3-math-r16"
rank = 16
alpha = 32.0

[orchestrator.train.sampling]
temperature = 1.0
max_completion_tokens = 1024

[orchestrator.train.sampling.extra_body]
chat_template_kwargs = { enable_thinking = false }

[[orchestrator.train.env]]
id = "math-loop"
name = "math-loop"
group_size = 4
num_workers = 1
args = { split_path = "data/math_loop/train_pool.jsonl", system_prompt = "/no_think\nSolve the problem. Keep the reasoning concise and put only the final answer inside \\boxed{}." }

[inference]
enable_lora = true
gpu_memory_utilization = 0.80

[orchestrator.renderer]
name = "auto"
